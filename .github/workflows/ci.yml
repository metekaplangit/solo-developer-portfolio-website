name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  governance-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      # Advisory, not merge-critical. This validates documentation consistency
      # (STATUS/ROADMAP/CHECKPOINTS/task-card agreement) — useful drift detection
      # on a repo that AI agents edit, but nothing it checks can reach a visitor.
      # It was previously merge-critical and failed a release because a prose
      # paragraph stopped mentioning a Step ID, while the same commit deployed
      # cleanly. It still runs and still reports; it no longer fails the run.
      - name: Governance validator (advisory)
        continue-on-error: true
        run: python3 scripts/validate-governance.py

      - name: Type + content schema check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Static build
        run: npm run build

  accessibility:
    # Automated accessibility + quality gate (Lighthouse CI) on the built pages.
    # Accessibility is asserted as an error; performance / SEO / best-practices are
    # warnings only — informational, so CI-runner variance never fails the build.
    # ubuntu-latest ships google-chrome-stable, which Lighthouse launches.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static build
        run: npm run build

      - name: Lighthouse CI (accessibility gate)
        run: npm run lhci
