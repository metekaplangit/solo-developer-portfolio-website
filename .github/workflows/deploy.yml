name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Skip deploys for docs-only commits — governance/checkpoint docs don't
    # change the built site. Note: src/content/**/*.md IS build content (not ignored).
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

# Least privilege: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only the latest commit needs to publish; cancel a superseded run instead of
# queuing behind it (fewer competing GitHub Pages deployments).
concurrency:
  group: pages
  cancel-in-progress: true

# Single job (no build→deploy artifact handoff / second runner cold-start) with
# npm caching and Node from .nvmrc. Build is fast; the remaining latency is
# GitHub's own Pages publish step (deploy-pages), which is out of our control.
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build (produces dist/, incl. CNAME from public/)
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Ride out transient GitHub Pages queue congestion (deployment_queued)
          # instead of failing at the default 10-minute timeout.
          timeout: 1200000
