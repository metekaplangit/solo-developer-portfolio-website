name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Skip deploys for docs-only commits — governance/checkpoint docs don't
    # change the built site, so there's no reason to run (and queue) a deploy.
    # Note: src/content/**/*.md IS build content and is NOT ignored.
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

# Least privilege: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only the latest commit needs to publish; cancel an older superseded deploy
# instead of queuing behind it (avoids pile-ups during GitHub Pages congestion).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 24

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Ride out transient GitHub Pages queue congestion (deployment_queued)
          # instead of failing at the default 10-minute timeout.
          timeout: 1200000
